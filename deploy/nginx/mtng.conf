# Nginx reverse-proxy config for Mtng
# Place this file at: /etc/nginx/sites-available/mtng
# Then: sudo ln -s /etc/nginx/sites-available/mtng /etc/nginx/sites-enabled/mtng
#
# !! IMPORTANT — Replace YOURDOMAIN.COM in FOUR places below !!
#   Line  9: server_name (HTTP block)
#   Line 20: server_name (HTTPS block)
#   Line 24: ssl_certificate path
#   Line 25: ssl_certificate_key path
#
# Replace YOURDOMAIN.COM with your actual domain (e.g. meet.example.com)

server {
    listen 80;
    listen [::]:80;
    server_name YOURDOMAIN.COM;

    # Redirect all HTTP → HTTPS (Cloudflare handles the browser ↔ CDN TLS;
    # this redirect keeps things clean for direct access too)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOURDOMAIN.COM;

    # ── SSL certificates (issued by Certbot / Let's Encrypt) ────────────────
    ssl_certificate     /etc/letsencrypt/live/YOURDOMAIN.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN.COM/privkey.pem;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers   HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;

    # ── Proxy to Spring Boot ─────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # Forward real client IP to Spring Boot
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (used by chat)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_read_timeout  90s;
        proxy_send_timeout  90s;
    }

    # ── Serve static assets with caching ─────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }
}
