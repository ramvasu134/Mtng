spring.application.name=Mtng

# ─── Server ──────────────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/

# Trusted proxy headers forwarded by Nginx / Cloudflare
server.forward-headers-strategy=NATIVE

# ─── PostgreSQL Database ─────────────────────────────────────────────────────
# Override via environment variables:
#   SPRING_DATASOURCE_URL   e.g. jdbc:postgresql://localhost:5432/mtngdb
#   SPRING_DATASOURCE_USERNAME
#   SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mtngdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:mtng_user}
# No default — must be supplied via environment variable or EnvironmentFile
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
# "update" keeps existing data between restarts; use "validate" once schema is stable
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Disable H2 Console in Production ────────────────────────────────────────
spring.h2.console.enabled=false

# ─── Thymeleaf ───────────────────────────────────────────────────────────────
spring.thymeleaf.cache=true

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.Mtng.Mtng=INFO
logging.level.org.springframework.security=WARN
logging.file.name=${LOG_FILE:/opt/mtng/logs/app.log}
logging.file.max-size=10MB
logging.file.max-history=10

# ─── Error Handling ──────────────────────────────────────────────────────────
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false
