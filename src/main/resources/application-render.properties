# ???????????????????????????????????????????????????????????????????????????????
# application-render.properties ? Render.com deployment profile
# ???????????????????????????????????????????????????????????????????????????????
# Activated via: SPRING_PROFILES_ACTIVE=render  (set in Render env vars)
#
# Key differences from default (local-dev) profile:
#   1. NO SSL ? Render terminates TLS at the edge; app runs plain HTTP.
#   2. PORT   ? Render injects the PORT env-var; we listen there.
#   3. H2 Console disabled ? not exposed on the public internet.
#   4. File logging disabled ? Render captures stdout/stderr automatically.
# ???????????????????????????????????????????????????????????????????????????????

# ?? Server ???????????????????????????????????????????????????????????????????
# Render sets PORT env-var (usually 10000); Spring will pick it up automatically.
server.port=${PORT:10000}

# ? Disable SSL ? Render provides HTTPS at the edge
server.ssl.enabled=false

# Trust Render's reverse-proxy headers (X-Forwarded-For, X-Forwarded-Proto)
server.forward-headers-strategy=NATIVE
server.tomcat.remoteip.remote-ip-header=X-Forwarded-For
server.tomcat.remoteip.protocol-header=X-Forwarded-Proto

# ?? H2 Database (same in-memory, but console disabled for security) ??????????
spring.datasource.url=jdbc:h2:mem:mtngdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=false

# ?? JPA / Hibernate ??????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# ?? Logging (stdout only, no file) ??????????????????????????????????????????
logging.file.name=
logging.level.root=WARN
logging.level.com.Mtng.Mtng=INFO

# ?? Thymeleaf ????????????????????????????????????????????????????????????????
spring.thymeleaf.cache=true

# ?? Multipart (same limits) ?????????????????????????????????????????????????
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

