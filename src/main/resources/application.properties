spring.application.name=Mtng

# Server Configuration
server.port=8080
server.servlet.context-path=/

# ??? H2 Database ?????????????????????????????????????????????????????????????
# DB_CLOSE_DELAY=-1 keeps the in-memory DB alive while the JVM runs (needed for H2 Console)
# DB_CLOSE_ON_EXIT=FALSE prevents shutdown on last connection close
spring.datasource.url=jdbc:h2:mem:mtngdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console ? access at http://localhost:8080/h2-console (ADMIN login required)
# When connecting in the H2 Console use: JDBC URL: jdbc:h2:mem:mtngdb  username: sa  password: (blank)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false
spring.h2.console.settings.trace=false

# ??? JPA / Hibernate ?????????????????????????????????????????????????????????
# create-drop: drops and re-creates schema on every startup; perfect for in-memory H2 demo
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
# Suppress the open-in-view warning
spring.jpa.open-in-view=false

# ?? Logging ??????????????????????????????????????????????????????????????????
logging.level.root=WARN
logging.level.com.Mtng.Mtng=INFO
logging.level.com.Mtng.Mtng.service.AuditService=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

# File logging
logging.file.name=app.log
logging.file.max-size=10MB
logging.file.max-history=5
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ??? Error Handling ??????????????????????????????????????????????????????????
server.error.include-message=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# ??? Thymeleaf ???????????????????????????????????????????????????????????????
spring.thymeleaf.cache=false

