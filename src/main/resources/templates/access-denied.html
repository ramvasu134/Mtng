<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTNG – Access Denied</title>
  <link rel="stylesheet" th:href="@{/css/mtng.css}" />
</head>
<body>
<div th:replace="~{layout :: header('none')}"></div>
<div th:replace="~{layout :: nav('none')}"></div>

<main class="main-content" style="text-align:center;padding-top:80px">
  <div style="font-size:72px;margin-bottom:16px">🚫</div>
  <h1 style="color:var(--orange-primary);font-size:28px;margin-bottom:12px">Access Denied</h1>
  <p class="text-muted" style="font-size:15px;max-width:400px;margin:0 auto 24px auto">
    You do not have permission to access this page.<br/>
    This action requires <strong style="color:var(--orange-primary)">Admin</strong> privileges.
  </p>
  <a href="/" class="btn btn-primary">← Back to Dashboard</a>
</main>

<div th:replace="~{layout :: footer}"></div>
<script th:src="@{/js/mtng.js}"></script>
</body>
</html>
