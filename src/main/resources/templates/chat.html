<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
                xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTNG – Chat</title>
  <link rel="stylesheet" th:href="@{/css/mtng.css}" />
</head>
<body>

<div th:replace="~{layout :: header('chat')}"></div>
<div th:replace="~{layout :: nav('chat')}"></div>

<main class="main-content" style="padding-bottom:0">
  <div class="chat-container">
    <!-- Messages area -->
    <div id="chatMessages" class="chat-messages">
      <div th:if="${#lists.isEmpty(messages)}" class="chat-empty">
        💬 No messages yet. Start a conversation!
      </div>
      <div th:each="m : ${messages}"
           style="margin-bottom:12px"
           th:style="${m.sender == 'Teacher'} ? 'text-align:right' : 'text-align:left'">
        <div class="chat-bubble"
             th:classappend="${m.sender == 'Teacher'} ? 'mine' : 'theirs'">
          <div class="bubble-sender" th:text="${m.sender}">Sender</div>
          <div th:text="${m.content}">Message</div>
          <div class="bubble-time"
               th:text="${m.sentAt != null ? #temporals.format(m.sentAt,'HH:mm') : ''}"></div>
        </div>
      </div>
    </div>

    <!-- Input bar -->
    <div class="chat-input-bar">
      <input id="chatInput"
             class="chat-input"
             type="text"
             placeholder="Type a message..."
             onkeydown="onChatKeydown(event)" />
      <button class="btn btn-primary" onclick="sendMessage()">Send ➤</button>
      <button sec:authorize="hasRole('ADMIN')" class="btn btn-secondary btn-sm" onclick="clearChat()" title="Clear chat">🗑</button>
    </div>
  </div>
</main>

<div th:replace="~{layout :: modals}"></div>
<div th:replace="~{layout :: footer}"></div>
<script th:src="@{/js/mtng.js}"></script>
</body>
</html>
