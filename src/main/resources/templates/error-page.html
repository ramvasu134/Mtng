<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>MTNG – Error</title>
  <style>
    body { font-family: monospace; background:#1A0A00; color:#FF6B00; padding:40px; }
    h1   { color:#EF4444; }
    pre  { background:#2A1400; padding:20px; border-radius:8px; color:#FFB37A; overflow:auto; white-space:pre-wrap; word-break:break-all; }
    a    { color:#FF6B00; }
  </style>
</head>
<body>
  <h1>⚠️ 500 – Internal Server Error</h1>
  <p><strong>Path:</strong> <span th:text="${requestUri}">–</span></p>
  <p><strong>Error Type:</strong> <span th:text="${errorType}">–</span></p>
  <p><strong>Message:</strong></p>
  <pre th:text="${errorMessage}">–</pre>
  <p><a href="/">← Back to Dashboard</a></p>
</body>
</html>
